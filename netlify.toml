[build]
  publish = "."
  functions = "netlify/functions"

# Pretty URLs: Netlify natively serves /page from page.html, strips trailing
# slashes, and 301-redirects /page.html and /page/ to the clean canonical /page.
# This is the SINGLE source of truth for URL canonicalization. Do NOT add
# explicit per-page trailing-slash redirect rules — Netlify's redirect engine
# matches both "/page/" and "/page" against `from = "/page/"`, so combined with
# `force = true` those rules create infinite self-redirect loops on the
# canonical clean URL.
[build.processing]
  skip_processing = false
  [build.processing.html]
    pretty_urls = true
  [build.processing.css]
    bundle = false
    minify = false
  [build.processing.js]
    bundle = false
    minify = false
  [build.processing.images]
    compress = false

# ── API function proxy (internal rewrite, not a public page) ──
[[redirects]]
  from = "/api/ai-chat"
  to = "/.netlify/functions/ai-chat"
  status = 200

# ── Domain canonicalization ──────────────────────────────────
# Force www to non-www (primary domain: weediesai.com)
[[redirects]]
  from = "https://www.weediesai.com/*"
  to = "https://weediesai.com/:splat"
  status = 301
  force = true

# Custom headers for SEO and security
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# ── HTTP Link canonical headers ──────────────────────────────
# Reinforces the <link rel="canonical"> in HTML with an HTTP-level signal.

[[headers]]
  for = "/"
  [headers.values]
    Link = '<https://weediesai.com/>; rel="canonical"'

[[headers]]
  for = "/about"
  [headers.values]
    Link = '<https://weediesai.com/about>; rel="canonical"'

