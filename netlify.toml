[build]
  publish = "."
  functions = "netlify/functions"

# Disable all Netlify post-processing to prevent conflicts with explicit redirect rules
[build.processing]
  skip_processing = false
  [build.processing.html]
    pretty_urls = false
  [build.processing.css]
    bundle = false
    minify = false
  [build.processing.js]
    bundle = false
    minify = false
  [build.processing.images]
    compress = false

# ── API function proxy (internal rewrite, not a public page) ──
[[redirects]]
  from = "/api/ai-chat"
  to = "/.netlify/functions/ai-chat"
  status = 200

# ── Domain canonicalization ──────────────────────────────────
# Force www to non-www (primary domain: weediesai.com)
[[redirects]]
  from = "https://www.weediesai.com/*"
  to = "https://weediesai.com/:splat"
  status = 301
  force = true

# ── .html → clean URL 301 redirects ──────────────────────────
# force = true so the redirect fires even though the .html file exists on disk.
# Google and browsers will follow these to the canonical clean URL.

[[redirects]]
  from = "/index.html"
  to = "/"
  status = 301
  force = true

