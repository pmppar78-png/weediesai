# Custom headers for SEO and security
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# ── HTTP Link canonical headers ──────────────────────────────
# Reinforces the <link rel="canonical"> in HTML with an HTTP-level signal.
# This helps Google resolve "Duplicate, Google chose different canonical" issues.

[[headers]]
  for = "/"
  [headers.values]
    Link = '<https://weediesai.com/>; rel="canonical"'

[[headers]]
  for = "/about"
  [headers.values]
    Link = '<https://weediesai.com/about>; rel="canonical"'

[[headers]]
