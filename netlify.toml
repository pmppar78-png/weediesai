[build]
  publish = "."
  functions = "netlify/functions"

# Disable Netlify's automatic Pretty URLs — we handle routing explicitly below
[processing]
  [processing.html]
    pretty_urls = false

# ── API function proxy (internal rewrite, not a public page) ──
[[redirects]]
  from = "/api/ai-chat"
  to = "/.netlify/functions/ai-chat"
  status = 200

# ── .html → clean URL 301 redirects ──────────────────────────
# force = true so the redirect fires even though the .html file exists on disk.
# Google and browsers will follow these to the canonical clean URL.

[[redirects]]
  from = "/index.html"
  to = "/"
  status = 301
  force = true

[[redirects]]
  from = "/about.html"
  to = "/about"
  status = 301
  force = true

