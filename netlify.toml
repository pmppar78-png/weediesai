# ── X-Robots-Tag noindex for .html paths ──────────────────────
# Tells Google to deindex .html URLs that are redirect sources.
# Even though these 301 redirect, Google may still try to index them.
# This header ensures Google drops them from the index entirely.

[[headers]]
  for = "/*.html"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"
