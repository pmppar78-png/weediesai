[build]
  publish = "."
  functions = "netlify/functions"

# Pretty URLs: Netlify natively serves /page from page.html. The explicit
# per-page 200 rewrites below prevent trailing-slash URL variants from returning
# redirect responses while keeping the canonical extensionless URLs unchanged.
[build.processing]
  skip_processing = false
  [build.processing.html]
    pretty_urls = true
  [build.processing.css]
    bundle = false
    minify = false
  [build.processing.js]
    bundle = false
    minify = false
  [build.processing.images]
    compress = false

# ── API function proxy (internal rewrite, not a public page) ──
[[redirects]]
  from = "/api/ai-chat"
  to = "/.netlify/functions/ai-chat"
  status = 200

# ── Trailing-slash page variants (200 rewrites, not redirects) ──
# Google had discovered slash variants as "Page with redirect". These rules keep
# those variants crawlable without changing the canonical clean URL signals.

[[redirects]]
  from = "/about/"
  to = "/about.html"
  status = 200

[[redirects]]
  from = "/advertise/"
  to = "/advertise.html"
  status = 200

