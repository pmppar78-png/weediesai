[build]
  publish = "."
  functions = "netlify/functions"

# Enable Pretty URLs so Netlify natively serves .html files at clean paths
# (e.g. about.html → /about) and auto-redirects .html requests to clean URLs.
[build.processing]
  skip_processing = false
  [build.processing.html]
    pretty_urls = true
  [build.processing.css]
    bundle = false
    minify = false
  [build.processing.js]
    bundle = false
    minify = false
  [build.processing.images]
    compress = false

# ── API function proxy (internal rewrite, not a public page) ──
[[redirects]]
  from = "/api/ai-chat"
  to = "/.netlify/functions/ai-chat"
  status = 200

# ── Domain canonicalization ──────────────────────────────────
# Force www to non-www (primary domain: weediesai.com)
[[redirects]]
  from = "https://www.weediesai.com/*"
  to = "https://weediesai.com/:splat"
  status = 301
  force = true

# ── Trailing slash → non-trailing slash 301 redirects ─────────
# Prevents duplicate content at /page/ vs /page. Canonical is always non-trailing.

[[redirects]]
  from = "/about/"
  to = "/about"
  status = 301
  force = true

