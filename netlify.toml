# ── Domain canonicalization ──────────────────────────────────
# Force www to non-www (primary domain: weediesai.com)
[[redirects]]
  from = "https://www.weediesai.com/*"
  to = "https://weediesai.com/:splat"
  status = 301
  force = true

# Custom headers for SEO and security
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# ── HTTP Link canonical headers ──────────────────────────────
# Reinforces the <link rel="canonical"> in HTML with an HTTP-level signal.

[[headers]]
  for = "/"
  [headers.values]
    Link = '<https://weediesai.com/>; rel="canonical"'

