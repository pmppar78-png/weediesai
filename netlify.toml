# ── X-Robots-Tag noindex for .html paths ──────────────────────
# Safety net: if Google somehow accesses a .html URL directly,
# tell it not to index the redirect source.

[[headers]]
  for = "/*.html"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"
