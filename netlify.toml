# ── X-Robots-Tag noindex for .html paths ──────────────────────
# Safety net: if a crawler reaches a .html URL directly (before pretty_urls
# redirects it), tell it not to index that variant. The canonical clean URL
# (e.g. /grow-ai) is unaffected because the path pattern matches *.html only.

[[headers]]
  for = "/*.html"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"
